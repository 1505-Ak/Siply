spring:
  application:
    name: siply-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/siply}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
  flyway:
    enabled: false

  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-me-super-secret-key}
    access-ttl-ms: ${JWT_ACCESS_TTL_MS:3600000}
    refresh-ttl-ms: ${JWT_REFRESH_TTL_MS:2592000000}
  uploads:
    dir: ${UPLOADS_DIR:uploads}
  storage:
    provider: ${STORAGE_PROVIDER:local} # local|s3|cloudinary
    s3:
      bucket: ${S3_BUCKET:}
      region: ${S3_REGION:us-east-1}
      access-key: ${S3_ACCESS_KEY:}
      secret-key: ${S3_SECRET_KEY:}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}

management:
  endpoints:
    web:
      exposure:
        include: health,info


