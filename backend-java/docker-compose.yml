version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: siply
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build: .
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/siply
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      JWT_SECRET: change-me-super-secret-key
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  db_data:


